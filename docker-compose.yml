version: '3.8'

services:

  frontend:
    build: ./client
    ports:
      - "5173:5173"
    command: npm run dev -- --host 0.0.0.0

  backend:
    build: ./backend
    ports:
      - "5000:5000"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
